name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-rust-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt-get -qq install pkg-config libssl-dev git
      - name: Add rustfmt and build
        run: |
          rustup component add rustfmt
          cargo build --verbose
          cargo test --verbose
          cargo fmt --all

  integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt-get -qq install pkg-config libssl-dev git
      - name: Write credentials file
        env:
          CREDENTIALS_JSON: ${{ secrets.BRAZE_CREDENTIALS }}
        run: |
          if [ -z "$CREDENTIALS_JSON" ]; then
            echo "::warning::BRAZE_CREDENTIALS secret is not set — integration tests will skip"
            exit 0
          fi
          printf '%s' "$CREDENTIALS_JSON" > "$RUNNER_TEMP/braze_credentials.json"
      - name: Run integration tests
        env:
          BRAZE_CREDENTIALS: ${{ runner.temp }}/braze_credentials.json
        run: cargo test --verbose --test export

  test-rust-nightly:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt-get -qq install pkg-config libssl-dev git
      - name: Add rustfmt and build
        run: |
          rustup component add rustfmt
          cargo build --verbose
          cargo test --verbose
          cargo fmt --all
